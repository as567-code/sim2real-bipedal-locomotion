# Bipedal environment configuration
env:
  xml_path: "assets/biped.xml"
  cmd_velocity: 0.5
  max_episode_steps: 1000
  enable_domain_rand: true
  terrain_type: null  # null = random per episode

# Observation / action dimensions (informational, derived from model)
obs_dim: 32
act_dim: 8

# Reward component weights
reward_weights:
  velocity_tracking: 1.5
  orientation: 0.8
  energy: 1.0
  torque_stability: 0.5
  joint_velocity: 0.3
  foot_clearance: 0.4
  alive: 1.0
  symmetry: 0.3
